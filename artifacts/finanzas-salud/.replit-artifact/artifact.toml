kind = "web"
previewPath = "/"
title = "Finanzas & Salud"
version = "1.0.0"
id = "artifacts/finanzas-salud"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24134

[services.development]
run = "pnpm --filter @workspace/finanzas-salud run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/finanzas-salud", "run", "build" ]
serve = "static"
publicDir = "artifacts/finanzas-salud/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24134"
BASE_PATH = "/"
